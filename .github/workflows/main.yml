name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      # 3️⃣ Upgrade pip + install dependencies (FIXED)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Linting (code quality check)
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ app/ pipeline/ --max-line-length=120 --ignore=E501,W503 || true

      # 5️⃣ Build Docker image (deployment check)
      - name: Build Docker image
        run: docker build -t stock-predictor .